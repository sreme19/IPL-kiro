name: Deploy IPL Kiro

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Create log directories
        run: mkdir -p logs/pytest

      - name: Run unit tests
        run: pytest api/tests/ -v -m unit --junit-xml=logs/pytest/unit.xml

      - name: Run functional tests
        run: pytest api/tests/ -v -m functional --junit-xml=logs/pytest/functional.xml

      - name: Run regression tests
        run: pytest api/tests/ -v -m regression --junit-xml=logs/pytest/regression.xml

      - name: Run all tests with coverage + combined log
        run: |
          pytest api/tests/ -v \
            --cov=api \
            --cov-report=html:logs/pytest/coverage \
            --cov-report=term-missing \
            --junit-xml=logs/pytest/junit.xml \
            --log-file=logs/pytest/run.log \
            --log-file-level=DEBUG

      - name: Upload backend test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs-${{ github.run_number }}
          path: logs/pytest/
          retention-days: 30

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        
      - name: Install dependencies
        run: npm ci

      - name: Create log directories
        run: mkdir -p logs/vitest

      - name: Type check
        run: npm run type-check

      - name: Run frontend tests
        run: npm test

      - name: Upload frontend test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-logs-${{ github.run_number }}
          path: logs/vitest/
          retention-days: 30

  deploy-staging:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Assemble lambda_package
        run: |
          rm -rf lambda_package
          mkdir -p lambda_package
          cp -r api lambda_package/
          cp -r data lambda_package/
          cp requirements.txt lambda_package/

      - name: Build SAM application
        run: sam build --use-container

      - name: Deploy to Staging
        run: |
          sam deploy --stack-name ipl-kiro-staging \
            --parameter-overrides Environment=staging PostHogKey=${{ secrets.POSTHOG_KEY }} \
            --s3-bucket ipl-kiro-deployments \
            --region us-west-2 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM

  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Assemble lambda_package
        run: |
          rm -rf lambda_package
          mkdir -p lambda_package
          cp -r api lambda_package/
          cp -r data lambda_package/
          cp requirements.txt lambda_package/

      - name: Build SAM application
        run: sam build --use-container

      - name: Deploy to Production
        run: |
          sam deploy --stack-name ipl-kiro-production \
            --parameter-overrides Environment=production PostHogKey=${{ secrets.POSTHOG_KEY }} \
            --s3-bucket ipl-kiro-deployments \
            --region us-west-2 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM
