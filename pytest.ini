[pytest]
# ──────────────────────────────────────────────────────────────────────────────
# pytest.ini  —  IPL-Kiro test runner configuration
# Read automatically every time `pytest` runs (locally or in CI).
# ──────────────────────────────────────────────────────────────────────────────

# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = api/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output verbosity ──────────────────────────────────────────────────────────
# NOTE: format strings with [..] are kept out of `addopts`; pytest's CLI parser
# treats square brackets there as test-id parametrisation and fails collection.
# Use the INI options below for any format that contains [] or other regex chars.
addopts =
    --verbose
    --tb=short
    --strict-markers
    --junit-xml=logs/pytest/junit.xml
    --log-file=logs/pytest/run.log
    --log-file-level=DEBUG
    --log-cli-level=INFO

# ── Logging (INI options — safe for [] and % formatting) ─────────────────────
log_cli = true
log_cli_format = %(asctime)s [%(levelname)-8s] %(message)s
log_cli_date_format = %H:%M:%S
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ── Markers ────────────────────────────────────────────────────────────────────
# Use these markers to run only a subset:
#   pytest -m unit        → unit tests only
#   pytest -m functional  → functional/integration tests only
#   pytest -m regression  → regression baseline tests only
markers =
    unit: Pure logic / model tests, no I/O
    functional: End-to-end API route tests via TestClient
    regression: Baseline snapshot tests to catch regressions
